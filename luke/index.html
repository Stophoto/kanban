<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-title" content="Luke's List">
<meta name="description" content="Luke's personal replenishment list">
<!-- Link preview (iMessage, social shares) — without these, shared links show no logo. -->
<meta property="og:type" content="website">
<meta property="og:title" content="Luke's List">
<meta property="og:description" content="Luke's private grocery & replenishment list.">
<meta property="og:image" content="https://stophoto.github.io/kanban/luke/icons/icon-512.png">
<meta property="og:url" content="https://stophoto.github.io/kanban/luke/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Luke's List">
<meta name="twitter:description" content="Luke's private grocery & replenishment list.">
<meta name="twitter:image" content="https://stophoto.github.io/kanban/luke/icons/icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Luke's List</title>
<style>
  :root{
    /* Fratello palette */
    --black:#1A1A1A; --white:#FFFFFF; --cream:#F6F1E9; --teal:#36B3AF; --teal-bright:#00D4C8;
    --slate:#4A4A4A; --grey:#908F8A; --grey-light:#C4C3C0; --fog:#E8E4DE;
    --divider:#E0E0E0; --card-light:#F5F0E8;
    --teal-tint:#E4F4F3; --teal-tint2:#D5EEEC;
    --need:#C2502F; --need-tint:#F6E9E4;
    --save-red:#D93A2C; --save-green:#2E9E5B;
    --bg:#FFFFFF; --surface:#FFFFFF;
    --radius:14px; --radius-lg:18px;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
    --font:'Montserrat',-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--black);font-family:var(--font);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  body{padding-top:var(--safe-top);min-height:100vh;}
  .app{max-width:480px;margin:0 auto;padding:0 20px 170px;}

  /* ---- header ---- */
  header{position:sticky;top:0;z-index:40;background:var(--white);
    padding:calc(14px + var(--safe-top)) 0 0;margin-top:calc(-1 * var(--safe-top));border-bottom:1px solid var(--divider);}
  .h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .wordmark{font-family:var(--font);font-weight:900;font-size:25px;letter-spacing:-1px;color:var(--black);text-transform:uppercase;}
  .wordmark .dot{color:var(--teal);}
  .sync{display:flex;align-items:center;gap:6px;font-size:9.5px;color:var(--grey);font-weight:700;letter-spacing:1.4px;text-transform:uppercase;}
  .sync .led{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}

  /* ---- mode toggle ---- */
  .toggle{display:flex;gap:10px;}
  .toggle button{border:none;background:var(--card-light);padding:11px 18px;border-radius:999px;font-family:var(--font);font-weight:800;
    font-size:13.5px;letter-spacing:.4px;color:var(--grey);cursor:pointer;display:flex;align-items:center;gap:8px;text-transform:uppercase;transition:all .18s;}
  .toggle button.active{background:var(--teal);color:var(--white);font-weight:900;box-shadow:0 5px 16px rgba(54,179,175,.40);}
  .toggle button:not(.active):active{background:var(--fog);}
  .toggle .tcount{font-size:11px;font-weight:800;color:var(--white);background:var(--need);min-width:19px;height:19px;
    padding:0 6px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;letter-spacing:0;}
  .toggle button.active .tcount{background:var(--white);color:var(--need);}

  /* ---- needs-list filter: text chips ---- */
  .chips{display:flex;gap:20px;overflow-x:auto;padding:16px 0 4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;font-size:12px;font-weight:700;color:var(--grey);cursor:pointer;white-space:nowrap;padding:2px 0 7px;
    position:relative;letter-spacing:.6px;text-transform:uppercase;transition:color .15s;}
  .chip.sel{color:var(--black);}
  .chip.sel::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2.5px;background:var(--teal);}

  /* ---- category quick-filter dropdown ---- */
  .catbar{display:flex;align-items:center;padding:12px 0 13px;position:relative;}
  .catselect{display:inline-flex;align-items:center;gap:8px;background:var(--teal-tint);cursor:pointer;
    border:1.5px solid var(--teal-tint2);border-radius:999px;padding:9px 13px;max-width:100%;
    transition:background .15s,border-color .15s;}
  .catselect:active{background:var(--teal-tint2);}
  .catselect.active{background:var(--teal);border-color:var(--teal);}
  .catselect .cat-ico,.catselect .cat-chev{display:flex;color:var(--teal);flex-shrink:0;pointer-events:none;}
  .catselect.active .cat-ico,.catselect.active .cat-chev{color:var(--white);}
  .catselect .cat-ico svg{width:15px;height:15px;}
  .catselect .cat-chev svg{width:15px;height:15px;}
  .catselect .cat-lbl{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--teal);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
  .catselect.active .cat-lbl{color:var(--white);}
  /* custom dropdown menu — lets us pin a bold "All categories" at the top */
  .catmenu-scrim{position:fixed;inset:0;z-index:44;display:none;}
  .catmenu-scrim.open{display:block;}
  .catmenu{position:absolute;top:calc(100% - 4px);left:0;min-width:240px;max-width:90vw;background:var(--white);
    border:1px solid var(--divider);border-radius:14px;box-shadow:0 18px 44px rgba(0,0,0,.20);
    max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:45;padding:0 6px 6px;display:none;}
  .catmenu.open{display:block;}
  .catmenu-item{display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    font-family:var(--font);font-size:14.5px;font-weight:600;color:var(--slate);padding:12px 14px;border-radius:9px;}
  .catmenu-item:active{background:var(--teal-tint);}
  .catmenu-item.sel{color:var(--teal);font-weight:800;}
  /* "All categories" stays pinned at the top while the rest of the list scrolls */
  .catmenu-item.pinned{position:sticky;top:0;background:var(--white);color:var(--black);font-weight:800;
    font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;border-radius:0;margin:0 -6px 5px;padding:15px 20px;
    border-bottom:1.5px solid var(--divider);z-index:1;}
  .catmenu-item.pinned.sel{color:var(--teal);}

  .view{display:none;} .view.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  /* ---- STORE header (in 'all' view) — eyebrow style ---- */
  .store-h{display:flex;align-items:baseline;gap:10px;margin:20px 0 2px;}
  .store-h .sh-name{font-family:var(--font);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);}
  .store-h .sh-count{font-size:11px;font-weight:700;color:var(--grey);margin-left:auto;letter-spacing:.5px;}

  /* ---- DEPARTMENT header — bold black + teal underline rule (hub style) ---- */
  .deptbar{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;cursor:pointer;
    padding:14px 0 9px;border-bottom:2.5px solid var(--teal);margin-top:2px;}
  .deptbar .db-name{font-family:var(--font);font-weight:800;font-size:20px;letter-spacing:-.3px;color:var(--black);}
  .deptbar .db-count{font-size:12px;font-weight:700;color:var(--grey);letter-spacing:.5px;}
  .deptbar .db-chev{width:18px;height:18px;color:var(--teal);margin-left:auto;transition:transform .24s cubic-bezier(.32,.72,0,1);}
  .deptbar.collapsed .db-chev{transform:rotate(-90deg);}
  .dept-items{overflow:hidden;transition:max-height .28s cubic-bezier(.32,.72,0,1),opacity .2s;}
  .dept-items.collapsed{max-height:0 !important;opacity:0;}

  /* ---- item ROW — clean list, hairline divider ---- */
  .row{display:flex;align-items:center;gap:14px;padding:11px 2px;cursor:pointer;position:relative;
    border-bottom:1px solid var(--divider);transition:background .12s;}
  .row:active{background:var(--cream);}
  .row.added{opacity:.5;}
  .row.checked .r-name{color:var(--grey-light);text-decoration:line-through;}

  .r-body{flex:1;min-width:0;}
  .r-name{font-size:16px;font-weight:600;letter-spacing:-.1px;line-height:1.3;color:var(--black);}
  .r-detail{font-size:12.5px;color:var(--grey);margin-top:2px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .r-note{font-size:12.5px;color:var(--teal);margin-top:3px;font-weight:600;display:flex;align-items:center;gap:5px;}
  .r-note svg{width:12px;height:12px;flex-shrink:0;}

  /* route tag — teal-tinted lozenge (hub "LIVE" style) for info-bearing tags only */
  .r-tag{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:6px;
    display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
  .r-tag svg{width:10px;height:10px;}
  .r-tag.locked{background:var(--need-tint);color:var(--need);}
  .r-tag.wait{background:var(--teal-tint);color:var(--teal);}
  .r-tag.anywhere{background:var(--fog);color:var(--slate);}

  /* catalog add control — clear circle that fills SOLID teal when on list */
  .r-add{width:30px;height:30px;border-radius:50%;border:2px solid var(--grey-light);flex-shrink:0;display:flex;
    align-items:center;justify-content:center;color:var(--grey);transition:all .16s;background:var(--white);}
  .r-add svg{width:16px;height:16px;}
  .row:active .r-add{border-color:var(--teal);color:var(--teal);}
  .r-add.done{background:var(--teal);border-color:var(--teal);color:var(--white);box-shadow:0 0 0 4px var(--teal-tint);}
  .r-add.done svg{width:17px;height:17px;stroke-width:3.4;}

  /* shopping list check — bold, obvious */
  .r-check{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--grey-light);flex-shrink:0;display:flex;
    align-items:center;justify-content:center;transition:all .15s;background:var(--white);}
  .r-check svg{width:15px;height:15px;opacity:0;transform:scale(.5);transition:all .15s;color:var(--white);stroke-width:3.4;}
  .row.checked .r-check{background:var(--teal);border-color:var(--teal);}
  .row.checked .r-check svg{opacity:1;transform:scale(1);}

  /* QTY badge on shopping list — shows how many to BUY, prominent */
  .qty-badge{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:42px;height:42px;border-radius:11px;background:var(--teal-tint);padding:0 8px;}
  .qty-badge .qb-num{font-size:18px;font-weight:800;color:var(--teal);line-height:1;letter-spacing:-.5px;}
  .qty-badge .qb-lbl{font-size:7.5px;font-weight:800;color:var(--teal);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;opacity:.75;}

  /* "or grab here anyway" divider inside dept */
  .or-line{font-size:9.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--grey);
    padding:16px 2px 6px;display:flex;align-items:center;gap:10px;}
  .or-line::before,.or-line::after{content:"";flex:1;height:1px;background:var(--divider);}

  /* empty */
  .empty{text-align:center;padding:64px 30px;color:var(--grey);}
  .empty .e-ico{width:44px;height:44px;margin:0 auto 18px;opacity:.4;color:var(--teal);}
  .empty p{font-size:15px;line-height:1.6;font-weight:500;color:var(--slate);}
  .empty .e-strong{color:var(--black);font-weight:700;}
  .empty .e-btn{display:inline-block;margin-top:20px;color:var(--white);background:var(--black);font-weight:700;font-size:13px;
    letter-spacing:.6px;text-transform:uppercase;font-family:var(--font);cursor:pointer;padding:13px 24px;border-radius:11px;}

  .collapse-all{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;color:var(--teal);
    cursor:pointer;padding:6px 0;margin:8px 2px 0;letter-spacing:.8px;text-transform:uppercase;}
  .collapse-all svg{width:13px;height:13px;}

  /* ---- floating search dock ---- */
  .searchdock{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(22px + var(--safe-bottom));z-index:50;
    width:calc(100% - 40px);max-width:440px;display:flex;align-items:center;gap:11px;background:var(--black);color:var(--white);
    border-radius:30px;height:56px;padding:0 9px 0 20px;box-shadow:0 10px 32px rgba(26,26,26,.3);cursor:text;}
  .searchdock svg.sd-ico{width:19px;height:19px;color:var(--teal);flex-shrink:0;}
  .searchdock input{flex:1;border:none;background:none;color:var(--white);font-size:15.5px;font-weight:500;font-family:var(--font);outline:none;height:100%;}
  .searchdock input::placeholder{color:rgba(255,255,255,.55);font-weight:500;}
  .searchdock .sd-add{width:40px;height:40px;border-radius:50%;background:var(--teal);border:none;color:var(--white);
    cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
  .searchdock .sd-add svg{width:21px;height:21px;}
  .searchdock.has-text .sd-add{display:flex;}
  .searchdock .sd-clear{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:var(--white);
    cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;}
  .searchdock.has-text .sd-clear{display:flex;}
  .searchdock .sd-new{display:flex;align-items:center;gap:6px;height:40px;padding:0 15px 0 12px;border-radius:20px;
    background:var(--teal);border:none;color:var(--white);cursor:pointer;flex-shrink:0;font-family:var(--font);
    font-weight:800;font-size:11px;letter-spacing:.8px;text-transform:uppercase;}
  .searchdock .sd-new svg{width:17px;height:17px;}
  .searchdock.has-text .sd-new{display:none;}

  /* search results overlay */
  .results{position:fixed;inset:0;z-index:48;background:var(--white);padding:calc(16px + var(--safe-top)) 20px 100px;overflow-y:auto;display:none;}
  .results.open{display:block;}
  .results h3{font-family:var(--font);font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);margin:8px 2px 4px;}
  .res-done{font-family:var(--font);font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--black);cursor:pointer;padding:8px;}

  /* sheet (add/edit) */
  .scrim{position:fixed;inset:0;background:rgba(26,26,26,.4);z-index:60;opacity:0;pointer-events:none;
    transition:opacity .25s;backdrop-filter:blur(2px);}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--white);border-radius:24px 24px 0 0;
    padding:8px 22px calc(26px + var(--safe-bottom));max-width:480px;margin:0 auto;transform:translateY(102%);
    transition:transform .34s cubic-bezier(.32,.72,0,1);max-height:94vh;overflow-y:auto;}
  .sheet.open{transform:translateY(0);}
  .grab-tap{display:block;padding:10px 0 16px;cursor:pointer;}
  .grab{width:44px;height:5px;border-radius:3px;background:var(--grey-light);margin:0 auto;}
  .sheet-x{position:absolute;top:12px;right:16px;width:34px;height:34px;border:none;background:var(--card-light);color:var(--slate);
    border-radius:50%;font-size:23px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 0 2px;z-index:2;}
  .sheet-x:active{background:var(--fog);}
  .sheet h2{font-family:var(--font);font-weight:800;font-size:23px;letter-spacing:-.5px;margin-bottom:3px;color:var(--black);}
  .sheet .sub{font-size:13px;color:var(--grey);margin-bottom:22px;font-weight:500;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--grey);margin-bottom:9px;}
  .field label .opt-lbl{text-transform:none;font-weight:500;color:var(--grey-light);letter-spacing:0;}
  .field input[type=text]{width:100%;background:var(--white);border:1.5px solid var(--divider);border-radius:12px;
    padding:14px;font-size:16px;font-family:var(--font);font-weight:500;color:var(--black);outline:none;transition:border .15s;}
  .field input:focus{border-color:var(--teal);}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg .opt{flex:1;min-width:max-content;background:var(--white);border:1.5px solid var(--divider);border-radius:11px;
    padding:12px 8px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--slate);letter-spacing:.3px;
    display:flex;align-items:center;justify-content:center;gap:5px;transition:all .14s;text-transform:uppercase;}
  .seg .opt svg{width:14px;height:14px;}
  .seg .opt.sel{background:var(--teal);border-color:var(--teal);color:var(--white);}
  /* category picker in the add/edit sheet */
  .catfield{position:relative;}
  .catfield select{width:100%;background:var(--white);border:1.5px solid var(--divider);border-radius:12px;
    padding:14px 42px 14px 14px;font-size:16px;font-family:var(--font);font-weight:600;color:var(--black);
    outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;transition:border .15s;}
  .catfield select:focus{border-color:var(--teal);}
  .catfield .catfield-chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--teal);display:flex;}
  .catfield .catfield-chev svg{width:18px;height:18px;}
  /* photo field in the add/edit sheet */
  .photofield{position:relative;}
  .photofield .photo-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    width:100%;min-height:118px;border:1.5px dashed var(--grey-light);border-radius:12px;color:var(--grey);
    font-size:13px;font-weight:700;cursor:pointer;background:var(--white);transition:border-color .15s,color .15s;}
  .photofield .photo-add:active{border-color:var(--teal);color:var(--teal);}
  .photofield .photo-add svg{width:28px;height:28px;color:var(--teal);}
  .photofield.has img{width:100%;height:auto;max-height:62vh;object-fit:contain;border-radius:12px;display:block;cursor:zoom-in;background:var(--fog);}
  .photofield .photo-rm{position:absolute;top:9px;right:9px;width:32px;height:32px;border:none;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;font-size:21px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 0 2px;}
  /* full-screen photo viewer */
  .photoview{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;padding:16px;}
  .photoview.open{display:flex;}
  .photoview img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;}
  .photoview .pv-x{position:absolute;top:calc(14px + var(--safe-top));right:16px;width:42px;height:42px;border:none;border-radius:50%;
    background:rgba(255,255,255,.16);color:#fff;font-size:27px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 0 3px;}
  /* small camera glyph on rows that have a photo */
  .r-cam{display:inline-flex;vertical-align:middle;margin-left:6px;color:var(--grey-light);}
  .r-cam svg{width:13px;height:13px;}
  /* in-app "are you sure?" confirm dialog (reliable in standalone PWAs, unlike confirm()) */
  .confirm{position:fixed;inset:0;z-index:100;background:rgba(26,26,26,.45);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;padding:28px;}
  .confirm.open{display:flex;}
  .confirm-card{width:100%;max-width:330px;background:var(--white);border-radius:20px;padding:24px 22px 16px;text-align:center;
    box-shadow:0 22px 60px rgba(0,0,0,.32);}
  .confirm-card h3{font-family:var(--font);font-weight:800;font-size:19px;letter-spacing:-.3px;color:var(--black);margin-bottom:8px;}
  .confirm-card p{font-size:13.5px;line-height:1.5;color:var(--grey);font-weight:500;margin-bottom:20px;}
  .confirm-del{width:100%;background:var(--save-red);color:var(--white);border:none;border-radius:13px;padding:15px;
    font-size:13px;font-weight:800;font-family:var(--font);letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
  .confirm-del:active{opacity:.9;}
  .confirm-cancel{width:100%;background:none;border:none;color:var(--slate);font-family:var(--font);font-weight:700;
    font-size:13px;letter-spacing:.5px;text-transform:uppercase;padding:14px;margin-top:2px;cursor:pointer;}
  .qty-edit{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1.5px solid var(--divider);border-radius:12px;padding:10px 14px;}
  .qty-edit .qe-txt{font-size:14.5px;font-weight:600;color:var(--slate);}
  .stepper{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .stepper button{width:34px;height:34px;border:1.5px solid var(--divider);background:var(--white);color:var(--black);font-size:20px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;border-radius:9px;}
  .stepper button:active{background:var(--teal);border-color:var(--teal);color:var(--white);}
  .stepper .sv{min-width:30px;text-align:center;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--black);}
  .routing-help{font-size:12px;color:var(--grey);line-height:1.5;margin-top:9px;padding-left:2px;font-weight:500;}
  .save{width:100%;background:var(--black);color:var(--white);border:none;border-radius:13px;padding:17px;font-size:13px;
    font-weight:800;font-family:var(--font);cursor:pointer;margin-top:10px;letter-spacing:1px;text-transform:uppercase;}
  .save:active{opacity:.9;} .save.ghost{background:none;color:var(--need);margin-top:10px;padding:13px;}
  .save.cancel{background:none;color:var(--grey);margin-top:16px;padding:13px;}
  /* primary Save button: red at rest, flips green while you press / right after saving */
  #saveBtn{background:var(--save-red);transition:background .12s;}
  #saveBtn:active,#saveBtn.ok{background:var(--save-green);opacity:1;}

  .toast{position:fixed;bottom:calc(96px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(12px);
    background:var(--black);color:var(--white);padding:13px 20px;border-radius:13px;font-size:13.5px;font-weight:600;z-index:80;
    opacity:0;pointer-events:none;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.24);white-space:nowrap;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .undo{color:var(--teal-bright);font-weight:800;margin-left:12px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;}

  /* ---- sync indicator states ---- */
  .sync.local .led{background:var(--grey);box-shadow:0 0 0 3px var(--fog);}
  .sync.offline{color:var(--need);}
  .sync.offline .led{background:var(--need);box-shadow:0 0 0 3px var(--need-tint);}

  /* ---- status banner (setup / offline notices) ---- */
  .banner{display:flex;align-items:flex-start;gap:12px;background:var(--cream);color:var(--slate);
    font-size:12.5px;font-weight:600;line-height:1.45;padding:11px 14px;border-radius:var(--radius);margin:14px 0 0;}
  .banner[hidden]{display:none;}
  .banner.err{background:var(--need-tint);color:var(--need);}
  .banner .b-msg{flex:1;}
  .banner .b-msg a{color:inherit;font-weight:800;text-decoration:underline;}
  .banner .b-x{flex-shrink:0;cursor:pointer;font-weight:800;font-size:16px;line-height:1;opacity:.55;padding:0 2px;background:none;border:none;color:inherit;}

  /* ---- loading state (before first data arrives) ---- */
  .loading{text-align:center;padding:60px 30px;color:var(--grey);font-size:13px;font-weight:600;letter-spacing:.3px;}
  .loading .l-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin:0 3px;
    animation:lpulse 1s infinite ease-in-out;}
  .loading .l-dot:nth-child(2){animation-delay:.15s;} .loading .l-dot:nth-child(3){animation-delay:.3s;}
  @keyframes lpulse{0%,100%{opacity:.25;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
  @media (prefers-reduced-motion: reduce){ .loading .l-dot{animation:none;} }

  /* ---- auth gate (Google sign-in) ---- */
  .authgate{position:fixed;inset:0;z-index:200;background:var(--white);display:flex;align-items:center;justify-content:center;
    padding:30px calc(30px + var(--safe-bottom));}
  .authgate[hidden]{display:none;}
  .ag-card{width:100%;max-width:330px;text-align:center;}
  .ag-mark{font-family:var(--font);font-weight:900;font-size:34px;letter-spacing:-1.5px;text-transform:uppercase;color:var(--black);}
  .ag-mark .dot{color:var(--teal);}
  .ag-sub{margin:12px 0 28px;color:var(--slate);font-size:14.5px;font-weight:500;line-height:1.5;}
  .ag-btn{display:inline-flex;align-items:center;justify-content:center;gap:11px;width:100%;min-height:54px;background:var(--black);
    color:var(--white);border:none;border-radius:30px;font-family:var(--font);font-weight:800;font-size:13px;letter-spacing:.7px;
    text-transform:uppercase;cursor:pointer;padding:0 18px;}
  .ag-btn:disabled{opacity:.55;cursor:default;}
  .ag-btn svg{width:18px;height:18px;flex-shrink:0;}
  .ag-note{margin-top:18px;color:var(--grey);font-size:12.5px;font-weight:500;line-height:1.55;}
  .ag-note strong{color:var(--slate);font-weight:700;}

  /* ---- print order list — one compact right-aligned row ---- */
  .printbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:nowrap;margin:2px 0 14px;}
  .printgroup{display:inline-flex;align-items:center;gap:2px;background:var(--card-light);border-radius:999px;padding:3px;min-width:0;}
  .printgroup .pg-lbl{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--grey);padding:0 5px 0 8px;white-space:nowrap;}
  .pg-opt{border:none;background:none;font-family:var(--font);font-weight:800;font-size:11px;letter-spacing:.2px;
    text-transform:uppercase;color:var(--grey);padding:6px 11px;border-radius:999px;cursor:pointer;transition:all .16s;white-space:nowrap;}
  .pg-opt.sel{background:var(--white);color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .printbtn{display:inline-flex;align-items:center;gap:6px;background:var(--teal);border:none;border-radius:999px;flex:none;
    padding:8px 15px;font-family:var(--font);font-weight:800;font-size:11px;letter-spacing:.4px;text-transform:uppercase;
    color:var(--white);cursor:pointer;transition:all .18s;box-shadow:0 4px 12px rgba(54,179,175,.32);}
  .printbtn:hover{filter:brightness(1.06);}
  .printbtn svg{width:15px;height:15px;}
  /* off-screen container, painted only when printing */
  #printArea{display:none;color:#000;font-family:var(--font);}
  #printArea .pr-head{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:2.5px solid #000;padding-bottom:8px;margin-bottom:6px;}
  #printArea .pr-title{font-size:23px;font-weight:900;letter-spacing:-.6px;}
  #printArea .pr-meta{font-size:10.5px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1.2px;}
  #printArea .pr-cat{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;
    color:#000;margin:18px 0 4px;padding-bottom:3px;border-bottom:1px solid #c9c9c9;break-after:avoid;page-break-after:avoid;}
  #printArea .pr-row{display:flex;align-items:flex-start;gap:11px;padding:5px 2px;
    border-bottom:1px dotted #d8d8d8;break-inside:avoid;page-break-inside:avoid;}
  #printArea .pr-box{width:13px;height:13px;border:1.6px solid #000;border-radius:3px;flex:none;margin-top:2px;}
  #printArea .pr-txt{flex:1;min-width:0;}
  #printArea .pr-line{font-size:14px;line-height:1.35;}
  #printArea .pr-name{font-weight:600;color:#000;}
  #printArea .pr-qty{font-weight:900;color:#000;margin-right:2px;}
  #printArea .pr-detail{font-size:11.5px;color:#555;font-weight:500;line-height:1.3;margin-top:1px;}
  /* store the item is ideally bought at — outlined tag (no fill, so it prints reliably) */
  #printArea .pr-store{flex:none;align-self:center;margin-left:10px;font-size:9.5px;font-weight:800;
    letter-spacing:.7px;text-transform:uppercase;color:#222;border:1.2px solid #b9b9b9;border-radius:999px;
    padding:2px 9px;white-space:nowrap;}
  @media print{
    body > *:not(#printArea){display:none !important;}
    #printArea{display:block !important;}
    @page{margin:16mm;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <div class="wordmark">Luke<span class="dot">.</span></div>
      <div class="sync" onclick="syncTap()" title="Tap to sign out"><span class="led"></span>SYNCED</div>
    </div>
    <div class="toggle" id="toggle">
      <button id="tabCatalog" class="active" onclick="setMode('catalog')">Needs list</button>
      <button id="tabList" onclick="setMode('list')">Shopping list <span class="tcount" id="listCount">0</span></button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="catbar">
      <div class="catselect" id="catSelect" onclick="toggleCatMenu(event)" role="button" aria-haspopup="listbox">

        <span class="cat-lbl" id="catLbl">All categories</span>
        <span class="cat-chev" id="catChev"></span>
      </div>
      <div class="catmenu-scrim" id="catMenuScrim" onclick="closeCatMenu()"></div>
      <div class="catmenu" id="catMenu" role="listbox"></div>
    </div>
  </header>

  <div class="banner" id="banner" hidden></div>

  <div id="catalogView" class="view active">
    <div id="catBody"></div>
  </div>

  <div id="listView" class="view">
    <div id="listBody"></div>
  </div>
</div>

<!-- floating search dock, thumb height -->
<div class="searchdock" id="searchdock" onclick="focusSearch(event)">
  <svg class="sd-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
  <input type="text" id="globalSearch" placeholder="Find an item" autocomplete="off" oninput="onSearch()" onfocus="openResults()">
  <button class="sd-add" id="sdAdd" onclick="addNewFromSearch(event)" title="Add as new"><span id="sdAddIco"></span></button>
  <button class="sd-clear" id="sdClear" onclick="clearSearch(event)">&times;</button>
  <button class="sd-new" id="sdNew" onclick="openAddNew(event)" title="Add a new product"><span id="sdNewIco"></span><span class="sd-new-lbl">New</span></button>
</div>

<!-- search results overlay -->
<div class="results" id="results">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <h3 id="resHead" style="margin:8px 2px 4px;">Results</h3>
    <div onclick="closeResults()" style="font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;padding:8px;">Done</div>
  </div>
  <div id="resBody"></div>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <button class="sheet-x" type="button" onclick="closeSheet()" aria-label="Close">&times;</button>
  <div class="grab-tap" onclick="closeSheet()" title="Close"><div class="grab"></div></div>
  <h2 id="sheetTitle">New item</h2>
  <div class="sub" id="sheetSub">Add something to your needs list</div>
  <div class="field"><label>Item name</label>
    <input type="text" id="fName" placeholder="e.g. Peanut butter" autocomplete="off"></div>
  <div class="field"><label>Store / section</label><div class="seg" id="fStore"></div></div>
  <div class="field"><label>Category</label>
    <div class="catfield">
      <select id="fDept" onchange="pickDept(this.value)"></select>
      <span class="catfield-chev" id="fDeptChev"></span>
    </div></div>
  <div class="field"><label>Where can you buy it?</label><div class="seg" id="fRouting"></div>
    <div class="routing-help" id="routingHelp"></div></div>
  <div class="field"><label>Buy how many each time?</label>
    <div class="qty-edit"><span class="qe-txt">Quantity to buy</span>
      <div class="stepper"><button onclick="bumpQty(-1)">&minus;</button><span class="sv" id="fQty">1</span><button onclick="bumpQty(1)">+</button></div>
    </div></div>
  <div class="field"><label>Detail / brand <span class="opt-lbl">&mdash; optional</span></label>
    <input type="text" id="fDetail" placeholder="e.g. Tres Extra Hold, level 4" autocomplete="off"></div>
  <div class="field"><label>Note for shopping <span class="opt-lbl">&mdash; optional</span></label>
    <input type="text" id="fNote" placeholder="e.g. check the back shelf, get the big one" autocomplete="off"></div>
  <div class="field" id="destField" style="display:none;"><label>Add it to</label>
    <div class="seg" id="fDest">
      <div class="opt sel" data-dest="needs" onclick="pickDest('needs')">Needs list</div>
      <div class="opt" data-dest="shopping" onclick="pickDest('shopping')">Shopping list now</div>
    </div></div>
  <button class="save" id="saveBtn" onclick="saveItem()">Save to needs list</button>
  <button class="save" id="listToggleBtn" onclick="listToggleFromSheet()" style="display:none;">Add to shopping list</button>
  <button class="save cancel" id="cancelBtn" type="button" onclick="closeSheet()">Cancel</button>
  <button class="save ghost" id="deleteBtn" onclick="deleteItem()" style="display:none;">Delete product</button>
  <div class="field" style="margin-top:16px;margin-bottom:0;"><label>Photo <span class="opt-lbl">&mdash; optional, e.g. snap the label</span></label>
    <div class="photofield" id="fPhotoBox"></div>
    <input type="file" accept="image/*" id="fPhotoInput" onchange="onPhotoPick(this)" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<!-- print-only order list, populated on demand by printList() -->
<div id="printArea"></div>

<!-- full-screen photo viewer (tap a product's photo to read the label) -->
<div class="photoview" id="photoview" onclick="closePhotoView()">
  <button class="pv-x" type="button" aria-label="Close">&times;</button>
  <img id="photoviewImg" alt="">
</div>

<!-- in-app confirmation (used for Delete) -->
<div class="confirm" id="confirm" onclick="closeConfirm()">
  <div class="confirm-card" onclick="event.stopPropagation()">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMsg"></p>
    <button class="confirm-del" type="button" onclick="doConfirm()">Delete forever</button>
    <button class="confirm-cancel" type="button" onclick="closeConfirm()">Keep it</button>
  </div>
</div>

<!-- Google sign-in gate. Shown only when Firebase is configured; covers the app until
     an allowed account is signed in. The real lock is in firestore.rules. -->
<div class="authgate" id="authgate" hidden>
  <div class="ag-card">
    <div class="ag-mark">Luke<span class="dot">.</span></div>
    <div class="ag-sub" id="agSub">A private list for Luke. Sign in to continue.</div>
    <button class="ag-btn" id="authBtn" onclick="signInGoogle()">Continue with Google</button>
    <div class="ag-note" id="agNote"></div>
  </div>
</div>

<script>
// iOS/PWA sometimes restores the previous scroll position when the app is
// reopened from the background (bfcache) instead of starting at the top —
// this stops the browser from doing that and forces the top on every show.
if('scrollRestoration' in history) history.scrollRestoration = 'manual';
window.addEventListener('pageshow', ()=> window.scrollTo(0,0));

const ICON = {
  grocery:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l2.5 13h11l2-9H6"/><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/></svg>',
  costco:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-5 9 5-9 5-9-5z"/><path d="M3 9v6l9 5 9-5V9"/><path d="M12 14v6"/></svg>',
  liquor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8M9 3v5a3 3 0 0 0 6 0V3M12 11v7M9 21h6"/></svg>',
  shoppers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 3.5l-7 7a3 3 0 0 0 0 4l5.5 5.5a3 3 0 0 0 4 0l7-7V3.5z"/><circle cx="16" cy="8" r="1.3" fill="currentColor"/></svg>',
  household:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>',
  all:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',
  globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18A14 14 0 0 1 12 3z"/></svg>',
  box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l9-4 9 4v8l-9 4-9-4V8z"/><path d="M3 8l9 4 9-4M12 12v8"/></svg>',
  chevD:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
  funnel:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4 2v-8z"/></svg>',
  camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9a2 2 0 0 1 2-2h2l1.4-2h7.2L19 7h0a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.2"/></svg>',
  collapse:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16"/><path d="M9 4l3 3 3-3M9 20l3-3 3 3"/></svg>',
  note:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  print:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="7" rx="1"/></svg>',
};
// The Firestore collection this deployed copy reads/writes. Kept as one constant so a
// per-person copy of this file (e.g. a family member's own version) can point at its
// own collection in the same Firebase project just by changing this one line.
const ITEMS_COLLECTION = 'items_luke';
const STORES = {
  grocery:{name:'Grocery',icon:ICON.grocery}, costco:{name:'Costco',icon:ICON.costco},
  liquor:{name:'Liquor',icon:ICON.liquor}, shoppers:{name:'Shoppers',icon:ICON.shoppers},
};
const STORE_ORDER = ['grocery','costco','liquor','shoppers'];
// In-store section order (rough physical layout) — used to lay out the dept headers.
const DEPT_ORDER = ['Produce','Dairy','Meat','Frozen','Bakery','Snacks','Condiments','Canned goods','Spices & dry ingredients','Breakfast','Baking','Beverages','Spirits','Wine','Beer & Cider','Toiletries','Cosmetics','Household','Paper','General'];
// Categories offered in the add/edit picker and the quick-filter dropdown — alphabetical.
const CATEGORIES = ['Baking','Beer & Cider','Beverages','Breakfast','Canned goods','Condiments','Cosmetics','Dairy','Frozen','General','Household','Meat','Paper','Produce','Snacks','Spices & dry ingredients','Spirits','Toiletries','Wine'];
// Beer/Wine/Spirits stay as real item subcategories (they still group as sections
// under the Liquor store), but the quick-filter collapses them into one "Liquor"
// button to keep that list short.
const LIQUOR_SUBCATS = ['Beer & Cider','Spirits','Wine'];
const FILTER_CATEGORIES = ['Baking','Beverages','Breakfast','Canned goods','Condiments','Cosmetics','Dairy','Frozen','General','Household','Liquor','Meat','Paper','Produce','Snacks','Spices & dry ingredients','Toiletries'];
// Category reorg (2026): old departments folded into the new taxonomy. Applied on
// load (normalizeItem) so live records migrate without a bulk database rewrite.
//   Health → Toiletries · Cleaning/Laundry/Kitchen → Household · Dry → Spices & dry ingredients
const DEPT_MAP = {
  'Health':'Toiletries',
  'Cleaning':'Household',
  'Laundry':'Household',
  'Kitchen':'Household',
  'Dry':'Spices & dry ingredients',
};
// One-time rename: existing items were stored "Brand first"; we now show the
// descriptive name first and the brand last. Applied on load (normalizeItem) so
// live records get the new name without a bulk database rewrite. Keyed on OLD name.
const RENAME_MAP = {};
const ITEM_RECAT = {};

const SEED = [];

// `items` is the in-memory working copy every render function reads from.
// Firebase mode keeps it in sync via onSnapshot; local mode loads it from localStorage.
let items = [];
let synced = false;        // false until first data load — drives the loading state
let backend = 'local';     // 'firebase' once a real config connects; otherwise 'local'
let mode = localStorage.getItem('pantry_mode') || 'catalog';
let filter = 'all';
let catFilter = 'all';     // active category quick-filter ('all' = every category)

let editingId = null;

function uid(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ============ STORAGE LAYER ============
   Two backends behind one tiny interface:
     • firebase — shared, real-time, both phones see the same live data
     • local    — per-device localStorage fallback (so the app works before
                  Firebase is configured, or if it can't be reached)
   Every action calls persistItem()/removeItem(); the renderers never care which
   backend is active. */

function persistItem(item){
  if(backend==='firebase'){
    const { db, fs } = window.PantryFB;
    return fs.setDoc(fs.doc(db,ITEMS_COLLECTION,item.id), stripId(item))
      .catch(err=>{ console.error('persist failed', err); setSync('offline'); });
  }
  saveLocal();
  return Promise.resolve();
}
function removeItem(id){
  items = items.filter(x=>x.id!==id);     // optimistic — keeps the UI instant
  if(backend==='firebase'){
    const { db, fs } = window.PantryFB;
    return fs.deleteDoc(fs.doc(db,ITEMS_COLLECTION,id))
      .catch(err=>{ console.error('delete failed', err); setSync('offline'); });
  }
  saveLocal();
  return Promise.resolve();
}

/* Normalize a stored item to the current schema. The "Household" store was retired
   and its items folded into Grocery (their category is preserved), so any existing
   record still tagged household is remapped on load. Idempotent. */
function normalizeItem(i){
  if(i.store==='household') i.store='grocery';
  if(RENAME_MAP[i.name]) i.name=RENAME_MAP[i.name];   // brand-first → descriptive-first
  if(!i.dept) i.dept='General';
  if(DEPT_MAP[i.dept]) i.dept=DEPT_MAP[i.dept];        // category reorg → new taxonomy
  const rc=ITEM_RECAT[i.name]; if(rc && i.dept===rc.from) i.dept=rc.to;  // one-time per-item move
  if(i.note===undefined) i.note='';
  return i;
}

/* ---- local backend ---- */
function saveLocal(){ try{ localStorage.setItem('pantry_v2', JSON.stringify(items)); }catch(e){} }
function loadLocal(){
  try{ const s=JSON.parse(localStorage.getItem('pantry_v2')); if(s&&s.length){ s.forEach(normalizeItem); return s; } }catch(e){}
  // first run on this device: hydrate from SEED
  const seeded = SEED.map(s=>({id:uid(),name:s.name,store:s.store,routing:s.routing,dept:s.dept||'General',
    detail:s.detail||'', note:'', onList:false, qty:1, checked:false}));
  try{ localStorage.setItem('pantry_v2', JSON.stringify(seeded)); }catch(e){}
  return seeded;
}
function bootLocal(reason){
  backend='local';
  items=loadLocal();
  synced=true;
  setSync('local');
  if(reason==='no-config'){
    showBanner('info','Single-device mode — changes stay on this phone. To sync both phones live, add your Firebase keys (see SETUP.md).');
  }
  refresh();
}

/* ---- firebase backend ---- */
async function seedIfEmpty(){
  const { db, fs } = window.PantryFB;
  const col = fs.collection(db,ITEMS_COLLECTION);
  const snap = await fs.getDocs(col);
  if(!snap.empty) return;                 // already seeded — never duplicate
  const batch = fs.writeBatch(db);
  SEED.forEach(s=>{
    const ref = fs.doc(db,ITEMS_COLLECTION,uid());
    batch.set(ref, { name:s.name, store:s.store, routing:s.routing, dept:s.dept||'General',
      detail:s.detail||'', note:'', qty:1, onList:false, checked:false });
  });
  await batch.commit();
}
let unsubSnap=null, offlineTimer=null;
/* Decide the sync badge from a snapshot's metadata.
   A live server snapshot => SYNCED immediately. A cache-only snapshot (e.g. the
   split-second your own edit is in flight, or a real disconnect) doesn't cry
   "Offline" right away — we wait a few seconds for the server to confirm first,
   so making an edit no longer leaves the badge stuck on OFFLINE. */
function syncFromSnap(meta){
  if(!meta.fromCache){ clearTimeout(offlineTimer); offlineTimer=null; setSync('online'); }
  else if(!offlineTimer){ offlineTimer=setTimeout(()=>{ offlineTimer=null; setSync('offline'); }, 4000); }
}
function startFirebaseSync(){
  if(unsubSnap) return;                    // already listening
  const { db, fs } = window.PantryFB;
  const col = fs.collection(db,ITEMS_COLLECTION);
  // includeMetadataChanges so the listener also fires when the server CONFIRMS a
  // local edit (otherwise the badge sticks on OFFLINE on the device that made it).
  unsubSnap = fs.onSnapshot(col, { includeMetadataChanges:true },
    snap=>{ items = snap.docs.map(d=>normalizeItem({ id:d.id, ...d.data() })); synced=true;
            syncFromSnap(snap.metadata);
            if(snap.docChanges().length) refresh(); },   // skip re-render on metadata-only updates
    err=>{ console.error('snapshot error', err); clearTimeout(offlineTimer); offlineTimer=null; setSync('offline');
           if(!synced){ showBanner('error',"Signed in, but couldn't load the list — make sure the Firestore rules are published (SETUP.md)."); } }
  );
}
function stopFirebaseSync(){ if(unsubSnap){ try{ unsubSnap(); }catch(e){} unsubSnap=null; } clearTimeout(offlineTimer); offlineTimer=null; }
/* ---- access control: only these Google accounts can open the shared list ----
   This is the friendly in-app gate; the REAL enforcement lives in firestore.rules,
   which lists the same emails. To add/remove a person, change BOTH places. */
const ALLOWED = ['lukeprefontaine@gmail.com'];

async function firebaseBoot(){
  const { auth, authFns } = window.PantryFB;
  showAuthGate('checking');
  // If we just came back from a Google redirect (mobile path), finish it.
  try{ await authFns.getRedirectResult(auth); }catch(e){ console.warn('redirect result', e); }
  // Drive the app off the signed-in state for the whole session.
  authFns.onAuthStateChanged(auth, async (user)=>{
    const email = user && (user.email||'').toLowerCase();
    if(!user){ stopFirebaseSync(); synced=false; items=[]; setSync('connecting'); showAuthGate('signin'); return; }
    if(!ALLOWED.includes(email)){
      showAuthGate('denied', email);
      try{ await authFns.signOut(auth); }catch(e){}
      return;
    }
    // authorized ✓
    hideAuthGate();
    const s=document.querySelector('.sync'); if(s) s.style.cursor='pointer';
    setSync('connecting');
    try{ await seedIfEmpty(); startFirebaseSync(); }
    catch(e){ console.error('post-sign-in load failed', e); setSync('offline');
      showBanner('error',"Signed in, but couldn't reach the list. Check the Firestore rules are published (SETUP.md)."); }
  });
}

function showAuthGate(state, email){
  const g=document.getElementById('authgate'); if(!g) return;
  const sub=document.getElementById('agSub'), note=document.getElementById('agNote'), btn=document.getElementById('authBtn');
  g.hidden=false;
  if(state==='checking'){ sub.textContent='Checking your sign-in…'; btn.style.visibility='hidden'; note.textContent=''; return; }
  btn.style.visibility='visible'; btn.disabled=false;
  if(state==='denied'){
    sub.textContent='That account isn’t on the list.';
    note.innerHTML=(email?'<strong>'+esc(email)+'</strong> can’t open this list. ':'')+'Only Luke’s Google account has access.';
    btn.innerHTML=googleBtnLabel('Try a different account');
  } else {
    sub.textContent='A private list for Luke. Sign in to continue.';
    note.textContent='';
    btn.innerHTML=googleBtnLabel('Continue with Google');
  }
}
function hideAuthGate(){ const g=document.getElementById('authgate'); if(g) g.hidden=true; }
async function signInGoogle(){
  const fb=window.PantryFB||{}, auth=fb.auth, authFns=fb.authFns;
  if(!auth||!authFns) return;
  const btn=document.getElementById('authBtn'), note=document.getElementById('agNote');
  const provider=new authFns.GoogleAuthProvider();
  provider.setCustomParameters({ prompt:'select_account' });
  if(btn) btn.disabled=true; if(note) note.textContent='';
  try{
    await authFns.signInWithPopup(auth, provider);
  }catch(e){
    console.warn('popup sign-in failed', e&&e.code);
    if(e && (e.code==='auth/popup-closed-by-user' || e.code==='auth/cancelled-popup-request')){ if(btn) btn.disabled=false; return; }
    if(e && (e.code==='auth/popup-blocked' || e.code==='auth/operation-not-supported-in-this-environment')){
      try{ await authFns.signInWithRedirect(auth, provider); return; }
      catch(e2){ console.error('redirect sign-in failed', e2); e=e2; }
    }
    if(note){
      let m='Sign-in didn’t work. Please try again.';
      if(e&&e.code==='auth/unauthorized-domain') m='This web address isn’t authorized in Firebase yet (SETUP.md → step 2c, Authorized domains).';
      else if(e&&(e.code==='auth/operation-not-allowed'||e.code==='auth/configuration-not-found')) m='Google sign-in isn’t turned on in Firebase yet (SETUP.md → step 2c).';
      note.textContent=m;
    }
    if(btn) btn.disabled=false;
  }
}
async function signOutKanban(){
  const fb=window.PantryFB||{};
  if(fb.auth&&fb.authFns){ try{ await fb.authFns.signOut(fb.auth); }catch(e){} }
}
function syncTap(){
  if(backend!=='firebase') return;
  const fb=window.PantryFB||{};
  if(fb.auth&&fb.auth.currentUser && confirm('Sign out on this device?')) signOutKanban();

/* ---- entry point, called by the Firebase module below once it has decided ---- */
async function bootPantry(opts){
  opts = opts || { backend:'local', reason:'no-config' };
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(console.error);
    // when a freshly-deployed version takes over, reload once so the new UI
    // shows automatically instead of getting stuck on an old cached copy.
    let _swReloading=false;
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(_swReloading) return; _swReloading=true; window.location.reload();
    });
  }
  if(opts.backend==='firebase'){
    backend='firebase';
    setSync('connecting');
    try{ await firebaseBoot(); return; }
    catch(e){
      console.error('Firebase boot failed, falling back to local.', e);
      showBanner('error',"Couldn't reach the shared list — showing this device's copy. Check your Firebase setup (SETUP.md).");
    }
  }
  bootLocal(opts.reason);
}
window.bootPantry = bootPantry;

/* ---- UI: sync LED + status banner ---- */
function setSync(state){
  const el=document.querySelector('.sync'); if(!el)return;
  el.classList.remove('local','offline');
  let label='SYNCED';
  if(state==='local'){ el.classList.add('local'); label='THIS DEVICE'; }
  else if(state==='offline'){ el.classList.add('offline'); label='OFFLINE'; }
  else if(state==='connecting'){ el.classList.add('local'); label='CONNECTING'; }
  el.innerHTML='<span class="led"></span>'+label;
}
function showBanner(kind,msg){
  const b=document.getElementById('banner'); if(!b)return;
  b.className='banner'+(kind==='error'?' err':'');
  b.innerHTML='<span class="b-msg">'+esc(msg)+'</span><button class="b-x" aria-label="Dismiss" onclick="this.parentElement.hidden=true">&times;</button>';
  b.hidden=false;
}

// does an item pass the active category filter? "Liquor" matches all liquor subcategories.
function catMatch(i){
  if(catFilter==='all') return true;
  if(catFilter==='Liquor') return LIQUOR_SUBCATS.includes(i.dept);
  return i.dept===catFilter;
}

// ============ CATALOG ============
function renderCatalog(){
  const body=document.getElementById('catBody');
  if(!synced){ body.innerHTML=loadingHTML(); return; }
  let pool=items.filter(i=>(filter==='all'||i.store===filter)&&catMatch(i));
  if(!pool.length){ body.innerHTML=`<div class="empty"><div class="e-ico">${ICON.box}</div><p>${catFilter==='all'?'Nothing here yet.':'No '+esc(catFilter)+' items here.'}</p></div>`; return; }

  let html='';
  const stores = filter==='all' ? STORE_ORDER : [filter];
  stores.forEach(s=>{
    const grp=pool.filter(i=>i.store===s);
    if(!grp.length) return;
    const depts=DEPT_ORDER.filter(d=>grp.some(i=>i.dept===d));
    if(filter==='all'){ html+=storeHeader(s,grp.length); }
    else { html+=collapseAllBtn(s,depts); }
    depts.forEach(d=>{
      const dg=grp.filter(i=>i.dept===d);
      const anchored=dg.filter(i=>i.store===s&&(i.routing==='locked'||i.routing==='wait'));
      const rest=dg.filter(i=>!anchored.includes(i));
      html+=deptBar(s,d,dg.length);
      const open=!isCollapsed(s,d);
      html+=`<div class="dept-items${open?'':' collapsed'}" style="${open?'max-height:none':'max-height:0'}"><div class="group">`;
      if(anchored.length && rest.length){
        html+=anchored.map(i=>catRow(i)).join('');
        html+=`<div class="or-line">or grab elsewhere</div>`;
        html+=rest.map(i=>catRow(i)).join('');
      } else {
        html+=dg.map(i=>catRow(i)).join('');
      }
      html+=`</div></div>`;
    });
  });
  body.innerHTML=html;
}
function storeHeader(s,count){
  return `<div class="store-h"><span class="sh-name">${STORES[s].name}</span><span class="sh-count">${count} ITEMS</span></div>`;
}
function collapseAllBtn(s,depts){
  const anyOpen=depts.some(d=>!isCollapsed(s,d));
  return `<div class="collapse-all" onclick="setAllDepts('${s}',${JSON.stringify(depts).replace(/"/g,'&quot;')},${anyOpen})">
    ${ICON.collapse}${anyOpen?'Collapse all':'Expand all'}</div>`;
}
function deptBar(s,d,count){
  const k=deptKey(s,d), open=!isCollapsed(s,d);
  return `<button class="deptbar${open?'':' collapsed'}" data-deptkey="${k}" onclick="toggleDept('${s}','${d}')">
    <span class="db-name">${d}</span>
    <span class="db-count">${count}</span>
    <span class="db-chev">${ICON.chevD}</span></button>`;
}
function routeTag(i, ctx){
  // Only show a tag when it carries information. "Anywhere" with no cross-store context = silent (it's the default).
  if(i.routing==='locked') return `<span class="r-tag locked">${ICON.lock}${STORES[i.store].name} only</span>`;
  if(i.routing==='wait') return `<span class="r-tag wait">${ICON.clock}Ideally ${STORES[i.store].name}</span>`;
  if(i.routing==='anywhere' && ctx && ctx!=='all' && ctx!==i.store) return `<span class="r-tag anywhere">Usually ${STORES[i.store].name}</span>`;
  return '';
}
function catRow(i){
  const detail=i.detail?`<div class="r-detail">${esc(i.detail)}</div>`:'';
  const tag=routeTag(i,null);
  // circle toggles on/off list; tapping the name/body opens editor
  const circle = i.onList ? `<div class="r-add done" onclick="event.stopPropagation();toggleList('${i.id}')">${ICON.check}</div>`
                          : `<div class="r-add" onclick="event.stopPropagation();toggleList('${i.id}')">${ICON.plus}</div>`;
  const qtyHint = i.onList && i.qty>1 ? `<span class="r-tag wait">${i.qty} to buy</span>` : '';
  return `<div class="row ${i.onList?'added':''}" onclick="editItem('${i.id}')">
    <div class="r-body"><div class="r-name">${esc(i.name)}${i.photo?` <span class="r-cam">${ICON.camera}</span>`:''}</div>${detail}</div>
    ${tag}${qtyHint}${circle}</div>`;
}

// ============ SHOPPING LIST ============
function renderList(){
  const body=document.getElementById('listBody');
  if(!synced){ body.innerHTML=loadingHTML(); return; }
  const onList=items.filter(i=>i.onList);
  if(!onList.length){
    body.innerHTML=`<div class="empty"><div class="e-ico">${ICON.box}</div>
      <p><span class="e-strong">Your shopping list is empty.</span><br>Open your needs list and tap the things you need.</p>
      <div class="e-btn" onclick="setMode('catalog')">Open needs list</div></div>`;
    return;
  }
  let html='';
  const stores = filter==='all' ? STORE_ORDER : [filter];
  stores.forEach(s=>{
    const visible = (filter==='all' ? onList.filter(i=>i.store===s) : onList.filter(i=>canBuyAt(i,s)))
      .filter(catMatch);
    if(!visible.length) return;
    const depts=DEPT_ORDER.filter(d=>visible.some(i=>i.dept===d));
    if(filter==='all'){ html+=storeHeader(s,visible.length); }
    else { html+=collapseAllBtn(s,depts); }
    depts.forEach(d=>{
      const dg=visible.filter(i=>i.dept===d);
      const anchored=dg.filter(i=>i.store===s&&(i.routing==='locked'||i.routing==='wait'));
      const homeAny=dg.filter(i=>i.store===s&&i.routing==='anywhere');
      const elsewhere=dg.filter(i=>i.store!==s);
      const topGroup=anchored.concat(homeAny);
      html+=deptBar(s,d,dg.length);
      const open=!isCollapsed(s,d);
      html+=`<div class="dept-items${open?'':' collapsed'}" style="${open?'max-height:none':'max-height:0'}"><div class="group">`;
      if(filter!=='all' && topGroup.length && elsewhere.length){
        html+=topGroup.map(i=>listRow(i,s)).join('');
        html+=`<div class="or-line">or grab here anyway</div>`;
        html+=elsewhere.map(i=>listRow(i,s)).join('');
      } else {
        html+=dg.map(i=>listRow(i, filter==='all'?'all':s)).join('');
      }
      html+=`</div></div>`;
    });
  });
  if(!html){ html=`<div class="empty"><div class="e-ico">${ICON.box}</div><p>No ${catFilter==='all'?'':esc(catFilter)+' '}items on your shopping list${filter==='all'?'':' for '+esc(STORES[filter].name)}.</p></div>`; }
  const g=printGroupBy;
  const printBtn=`<div class="printbar">
    <div class="printgroup" role="group" aria-label="Group printable list by">
      <span class="pg-lbl">Group</span>
      <button class="pg-opt${g==='cat'?' sel':''}" data-g="cat" onclick="setPrintGroup('cat')">Category</button>
      <button class="pg-opt${g==='store'?' sel':''}" data-g="store" onclick="setPrintGroup('store')">Store</button>
    </div>
    <button class="printbtn" onclick="printList()" title="Print order list" aria-label="Print order list">${ICON.print}<span>Print</span></button>
  </div>`;
  body.innerHTML=printBtn+html;
}

// Build a clean, paper-friendly order list and hand it to the browser's print dialog.
// Groups by category or by store (printGroupBy); the per-row tag flips to show the OTHER
// dimension. Always prints the whole shopping list, ignoring the on-screen filters.
function printList(){
  const onList=items.filter(i=>i.onList);
  if(!onList.length){ toast('Nothing on your list to print'); return; }
  const byStore = printGroupBy==='store';
  // outer groups: store names (in aisle/store order) or categories (in physical layout order)
  let groups;
  if(byStore){
    const keys=STORE_ORDER.filter(s=>onList.some(i=>i.store===s));
    onList.forEach(i=>{ if(!keys.includes(i.store)) keys.push(i.store); });   // never drop an item
    groups=keys.map(s=>({label:(STORES[s]||{}).name||s, items:onList.filter(i=>i.store===s)
      .sort((a,b)=>(DEPT_ORDER.indexOf(a.dept)-DEPT_ORDER.indexOf(b.dept))||a.name.localeCompare(b.name))}));
  } else {
    const keys=DEPT_ORDER.filter(d=>onList.some(i=>i.dept===d));
    onList.forEach(i=>{ if(!keys.includes(i.dept)) keys.push(i.dept); });
    groups=keys.map(d=>({label:d, items:onList.filter(i=>i.dept===d).sort((a,b)=>a.name.localeCompare(b.name))}));
  }
  let rows='';
  groups.forEach(grp=>{
    rows+=`<div class="pr-cat">${esc(grp.label)}</div>`;
    grp.items.forEach(i=>{
      const qty=i.qty>1?`<span class="pr-qty">${i.qty}×</span>`:'';
      const detail=i.detail?`<div class="pr-detail">${esc(i.detail)}</div>`:'';
      const tagText = byStore ? i.dept : ((STORES[i.store]||{}).name||i.store);
      const tag=`<span class="pr-store">${esc(tagText)}</span>`;
      rows+=`<div class="pr-row"><span class="pr-box"></span><div class="pr-txt"><div class="pr-line">${qty}<span class="pr-name">${esc(i.name)}</span></div>${detail}</div>${tag}</div>`;
    });
  });
  const n=onList.length;
  const dateStr=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  const meta=`${n} item${n>1?'s':''} &middot; by ${byStore?'store':'category'} &middot; ${dateStr}`;
  document.getElementById('printArea').innerHTML=
    `<div class="pr-head"><div class="pr-title">Shopping list</div><div class="pr-meta">${meta}</div></div>${rows}`;
  window.print();
}
function listRow(i,ctx){
  const detail=i.detail?`<div class="r-detail">${esc(i.detail)}</div>`:'';
  const note=i.note?`<div class="r-note">${ICON.note}${esc(i.note)}</div>`:'';
  const tag=routeTag(i,ctx);
  const qtyBadge=`<div class="qty-badge"><span class="qb-num">${i.qty}</span><span class="qb-lbl">Buy</span></div>`;
  return `<div class="row ${i.checked?'checked':''}">
    <div class="r-check" onclick="event.stopPropagation();toggleCheck('${i.id}')">${ICON.check}</div>
    <div class="r-body" onclick="editItem('${i.id}')"><div class="r-name">${esc(i.name)}${i.photo?` <span class="r-cam">${ICON.camera}</span>`:''}</div>${detail}${note}</div>

}

let checkTimers = {};   // per-item restock timers, keyed by id (so a re-tap cancels)
function addToList(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  i.onList=true; i.checked=false; if(!i.qty||i.qty<1) i.qty=1;
  persistItem(i); refresh(); toast(`${i.name} added to list`);
}
function toggleList(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  if(i.onList){ i.onList=false; i.checked=false; persistItem(i); refresh(); toast(`${i.name} removed`); }
  else { i.onList=true; i.checked=false; if(!i.qty||i.qty<1)i.qty=1; persistItem(i); refresh(); toast(`${i.name} added`); }
}
function toggleCheck(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  i.checked=!i.checked;
  persistItem(i);
  if(mode==='list')renderList();
  if(i.checked){
    clearTimeout(checkTimers[id]);
    checkTimers[id]=setTimeout(()=>{
      delete checkTimers[id];
      const it=items.find(x=>x.id===id); if(!it)return;   // re-find: snapshot may have replaced the array
      it.checked=false; it.onList=false; persistItem(it);
      if(mode==='list')renderList(); updateListCount(); renderChips();
      toastUndo(`${it.name} restocked`, id);
    }, 550);
  } else { clearTimeout(checkTimers[id]); delete checkTimers[id]; }
}
function undoRestock(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  i.onList=true; i.checked=false; persistItem(i); refresh();
  document.getElementById('toast').classList.remove('show');
}
function stepQty(id,d){
  const i=items.find(x=>x.id===id); if(!i)return;

// ---- photo: shrink on the device, store the small version with the product ----
// Scales the longest edge down to ~1200px (sharp enough to read a label full-screen
// on a phone) and re-compresses until it's comfortably small, so it never bloats the
// list or exceeds Firestore's per-item limit.
function downscaleImage(file, maxEdge, quality){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(!w||!h){ reject(new Error('empty image')); return; }
      const scale=Math.min(1, maxEdge/Math.max(w,h));
      w=Math.round(w*scale); h=Math.round(h*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let q=quality, out=c.toDataURL('image/jpeg',q);
      while(out.length>620000 && q>0.4){ q-=0.1; out=c.toDataURL('image/jpeg',q); }
      resolve(out);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('decode failed')); };
    img.src=url;
  });
}

function saveItem(){
  const name=document.getElementById('fName').value.trim();

  const detail=document.getElementById('fDetail').value.trim();
  const note=document.getElementById('fNote').value.trim();

  if(editingId){

    Object.assign(i,{name,detail,note,store:draft.store,routing:draft.routing,qty:draft.qty,dept:draft.dept||'General',photo:draft.photo||''});

    photo:draft.photo||'', onList:toShopping,checked:false};

/* Swipe the sheet down to dismiss (only from the top, and not while interacting with a field). */
(function(){
  const sheet=document.getElementById('sheet'); if(!sheet) return;
  let startY=0, dragging=false, delta=0;
  const noDrag = el => el && el.closest && el.closest('input,textarea,select,button,.seg,.stepper,.qty-edit');
  sheet.addEventListener('touchstart',e=>{
    if(sheet.scrollTop>3 || noDrag(e.target)){ dragging=false; return; }
    startY=e.touches[0].clientY; dragging=true; delta=0; sheet.style.transition='none';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging) return;
    delta=e.touches[0].clientY-startY; if(delta<0) delta=0;
    sheet.style.transform='translateY('+delta+'px)';
  },{passive:true});
  const end=()=>{
    if(!dragging) return; dragging=false;
    sheet.style.transition=''; sheet.style.transform='';
    if(delta>110) closeSheet();
  };
  sheet.addEventListener('touchend',end);
  sheet.addEventListener('touchcancel',end);
})();

<!-- Firebase loader (module). Reads ./firebase-config.js: with real keys it connects to
     the shared Firestore so both phones sync; otherwise the app runs single-device. -->
<script type="module">
  let firebaseConfig = null;
  try { ({ firebaseConfig } = await import('./firebase-config.js')); }
  catch(e){ console.warn('firebase-config.js missing or invalid — single-device mode.', e); }
  const hasConfig = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.projectId
                    && !String(firebaseConfig.apiKey).includes('PASTE');
  if(!hasConfig){
    window.bootPantry({ backend:'local', reason:'no-config' });
  } else {
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const fs = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const a = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const app = initializeApp(firebaseConfig);
      let db;
      try{ db = fs.initializeFirestore(app, { localCache: fs.persistentLocalCache({ tabManager: fs.persistentMultipleTabManager() }) }); }
      catch(e){ console.warn('Offline cache unavailable; using in-memory cache.', e); db = fs.getFirestore(app); }
      // Stay signed in indefinitely: IndexedDB persistence survives browser/app
      // restarts and resists Safari's storage eviction far better than localStorage,
      // so the signed-in family member doesn't get logged out. The popup/redirect resolver MUST be
      // passed to initializeAuth or Google sign-in (popup + mobile redirect) breaks.
      let auth;
      try{
        auth = a.initializeAuth(app, {
          persistence: [a.indexedDBLocalPersistence, a.browserLocalPersistence],
          popupRedirectResolver: a.browserPopupRedirectResolver
        });
      }catch(e){
        console.warn('initializeAuth failed; falling back to getAuth.', e);
        auth = a.getAuth(app);
        try{ await a.setPersistence(auth, a.indexedDBLocalPersistence); }catch(_){}
      }
      window.PantryFB = { db, fs, auth, authFns: {
        GoogleAuthProvider: a.GoogleAuthProvider, signInWithPopup: a.signInWithPopup,
        signInWithRedirect: a.signInWithRedirect, getRedirectResult: a.getRedirectResult,
        onAuthStateChanged: a.onAuthStateChanged, signOut: a.signOut } };
      window.bootPantry({ backend:'firebase' });
    }catch(e){
      console.error('Could not load Firebase; running in single-device mode.', e);
      window.bootPantry({ backend:'local', reason:'fb-init-failed' });
    }
  }
</script>
